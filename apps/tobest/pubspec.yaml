name: tobest
description: TO Best — تطبيق التدريب والتغذية
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── الحزمة المشتركة ────────────────────────────────────────
  shared:
    path: ../../packages/shared

  # ── Navigation ─────────────────────────────────────────────
  go_router: ^14.2.0

  # ── State Management ───────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # ── Local Storage ──────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Utilities ──────────────────────────────────────────────
  intl: ^0.20.0
  uuid: ^4.4.0

  # ── Image / Media ──────────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # ── Pedometer ──────────────────────────────────────────────
  pedometer: ^4.0.2

  # ── Video ──────────────────────────────────────────────────
  video_player: ^2.8.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/l10n/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
