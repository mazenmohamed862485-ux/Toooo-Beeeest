name: CI - Analyze and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Dart Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.0

      - name: Bootstrap Packages
        run: melos bootstrap

      - name: Create Secrets Placeholder
        run: |
          {
            echo "// CI placeholder - real values injected in CD"
            echo "class AppSecrets {"
            echo "  AppSecrets._();"
            echo "  static const String gasBaseUrl   = 'https://placeholder.example.com';"
            echo "  static const String gasSecretKey = 'placeholder';"
            echo "  static const String geminiApiKey = 'placeholder';"
            echo "}"
          } > packages/shared/lib/config/secrets.dart

      - name: Generate Code
        run: melos run generate

      - name: Analyze All Packages
        run: melos run analyze

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.0

      - name: Bootstrap
        run: melos bootstrap

      - name: Create Secrets Placeholder
        run: |
          {
            echo "// CI placeholder - real values injected in CD"
            echo "class AppSecrets {"
            echo "  AppSecrets._();"
            echo "  static const String gasBaseUrl   = 'https://placeholder.example.com';"
            echo "  static const String gasSecretKey = 'placeholder';"
            echo "  static const String geminiApiKey = 'placeholder';"
            echo "}"
          } > packages/shared/lib/config/secrets.dart

      - name: Generate Code
        run: melos run generate

      - name: Run Tests
        run: melos run test

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
