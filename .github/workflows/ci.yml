name: CI - Analyze and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Dart Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.0

      - name: Bootstrap Packages
        run: melos bootstrap

      - name: Create Secrets Placeholder
        run: |
          {
            echo "// CI placeholder - real values injected in CD"
            echo "class AppSecrets {"
            echo "  AppSecrets._();"
            echo "  static const String gasBaseUrl   = 'https://placeholder.example.com';"
            echo "  static const String gasSecretKey = 'placeholder';"
            echo "  static const String geminiApiKey = 'placeholder';"
            echo "}"
          } > packages/shared/lib/config/secrets.dart

      - name: Phase 1 - Generate Isar Models
        env:
          ISAR_PUBSPEC: |
            name: shared
            environment:
              sdk: '>=3.3.0 <4.0.0'
              flutter: '>=3.44.0'
            dependencies:
              flutter:
                sdk: flutter
              flutter_riverpod: ^2.5.1
              riverpod_annotation: ^2.3.5
              hooks_riverpod: ^2.5.1
              flutter_hooks: ^0.20.5
              isar: ^3.1.0
              isar_flutter_libs: ^3.1.0
              path_provider: ^2.1.3
              dio: ^5.4.3
              go_router: ^14.2.0
              video_player: ^2.8.7
              flutter_local_notifications: ^17.2.2
              google_sign_in: ^6.2.1
              google_generative_ai: ^0.4.6
              google_fonts: ^6.2.1
              pedometer: ^4.0.2
              image_picker: ^1.1.2
              flutter_secure_storage: ^9.2.2
              connectivity_plus: ^6.0.3
              cached_network_image: ^3.3.1
              workmanager: ^0.9.0
              intl: ^0.20.0
              uuid: ^4.4.0
              crypto: ^3.0.3
              shared_preferences: ^2.2.3
              permission_handler: ^11.3.1
            dev_dependencies:
              flutter_test:
                sdk: flutter
              build_runner: ^2.4.11
              isar_generator: ^3.1.0
            flutter:
              assets:
                - assets/images/
                - assets/l10n/
        run: |
          cp packages/shared/pubspec.yaml packages/shared/pubspec.yaml.bak
          printf '%s\n' "$ISAR_PUBSPEC" > packages/shared/pubspec.yaml
          cd packages/shared && flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          cd ../..
          cp packages/shared/pubspec.yaml.bak packages/shared/pubspec.yaml

      - name: Phase 2 - Bootstrap + Generate Riverpod Providers
        run: |
          # Save Isar .g.dart files generated in Phase 1 so we can restore them later
          mkdir -p /tmp/shared_isar_backup
          find packages/shared/lib -name "*.g.dart" \
            -exec cp --parents {} /tmp/shared_isar_backup/ \; 2>/dev/null || true
          echo "Backed up $(find /tmp/shared_isar_backup -name '*.g.dart' | wc -l) Isar files"

          melos bootstrap

          # Step A: Run Riverpod generation in shared FIRST (it will delete Isar files — expected)
          (cd packages/shared && dart run build_runner build --delete-conflicting-outputs)

          # Step B: Restore Isar model .g.dart files deleted in Step A
          find /tmp/shared_isar_backup/packages/shared/lib -name "*.g.dart" 2>/dev/null \
            | while read f; do
                rel="${f#/tmp/shared_isar_backup/}"
                mkdir -p "$(dirname "$rel")"
                cp "$f" "$rel"
              done
          echo "Restored: $(find packages/shared/lib -name '*.g.dart' | wc -l) .g.dart files in shared"

          # Step C: Run Riverpod generation in app packages
          # (shared now has both Riverpod + Isar files, so Dart analyzer resolves all types)
          (cd apps/tobest && dart run build_runner build --delete-conflicting-outputs)
          (cd apps/tobest_management && dart run build_runner build --delete-conflicting-outputs)

      - name: Analyze All Packages
        run: melos run analyze

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.0

      - name: Bootstrap Packages
        run: melos bootstrap

      - name: Create Secrets Placeholder
        run: |
          {
            echo "// CI placeholder - real values injected in CD"
            echo "class AppSecrets {"
            echo "  AppSecrets._();"
            echo "  static const String gasBaseUrl   = 'https://placeholder.example.com';"
            echo "  static const String gasSecretKey = 'placeholder';"
            echo "  static const String geminiApiKey = 'placeholder';"
            echo "}"
          } > packages/shared/lib/config/secrets.dart

      - name: Phase 1 - Generate Isar Models
        env:
          ISAR_PUBSPEC: |
            name: shared
            environment:
              sdk: '>=3.3.0 <4.0.0'
              flutter: '>=3.44.0'
            dependencies:
              flutter:
                sdk: flutter
              flutter_riverpod: ^2.5.1
              riverpod_annotation: ^2.3.5
              hooks_riverpod: ^2.5.1
              flutter_hooks: ^0.20.5
              isar: ^3.1.0
              isar_flutter_libs: ^3.1.0
              path_provider: ^2.1.3
              dio: ^5.4.3
              go_router: ^14.2.0
              video_player: ^2.8.7
              flutter_local_notifications: ^17.2.2
              google_sign_in: ^6.2.1
              google_generative_ai: ^0.4.6
              google_fonts: ^6.2.1
              pedometer: ^4.0.2
              image_picker: ^1.1.2
              flutter_secure_storage: ^9.2.2
              connectivity_plus: ^6.0.3
              cached_network_image: ^3.3.1
              workmanager: ^0.9.0
              intl: ^0.20.0
              uuid: ^4.4.0
              crypto: ^3.0.3
              shared_preferences: ^2.2.3
              permission_handler: ^11.3.1
            dev_dependencies:
              flutter_test:
                sdk: flutter
              build_runner: ^2.4.11
              isar_generator: ^3.1.0
            flutter:
              assets:
                - assets/images/
                - assets/l10n/
        run: |
          cp packages/shared/pubspec.yaml packages/shared/pubspec.yaml.bak
          printf '%s\n' "$ISAR_PUBSPEC" > packages/shared/pubspec.yaml
          cd packages/shared && flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          cd ../..
          cp packages/shared/pubspec.yaml.bak packages/shared/pubspec.yaml

      - name: Phase 2 - Bootstrap + Generate Riverpod Providers
        run: |
          # Save Isar .g.dart files generated in Phase 1 so we can restore them later
          mkdir -p /tmp/shared_isar_backup
          find packages/shared/lib -name "*.g.dart" \
            -exec cp --parents {} /tmp/shared_isar_backup/ \; 2>/dev/null || true
          echo "Backed up $(find /tmp/shared_isar_backup -name '*.g.dart' | wc -l) Isar files"

          melos bootstrap

          # Step A: Run Riverpod generation in shared FIRST (it will delete Isar files — expected)
          (cd packages/shared && dart run build_runner build --delete-conflicting-outputs)

          # Step B: Restore Isar model .g.dart files deleted in Step A
          find /tmp/shared_isar_backup/packages/shared/lib -name "*.g.dart" 2>/dev/null \
            | while read f; do
                rel="${f#/tmp/shared_isar_backup/}"
                mkdir -p "$(dirname "$rel")"
                cp "$f" "$rel"
              done
          echo "Restored: $(find packages/shared/lib -name '*.g.dart' | wc -l) .g.dart files in shared"

          # Step C: Run Riverpod generation in app packages
          # (shared now has both Riverpod + Isar files, so Dart analyzer resolves all types)
          (cd apps/tobest && dart run build_runner build --delete-conflicting-outputs)
          (cd apps/tobest_management && dart run build_runner build --delete-conflicting-outputs)

      - name: Run Tests
        run: melos run test

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
