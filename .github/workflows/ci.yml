name: CI - Analyze and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Dart Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.0

      - name: Bootstrap Packages
        run: melos bootstrap

      - name: Create Secrets Placeholder
        run: |
          {
            echo "// CI placeholder - real values injected in CD"
            echo "class AppSecrets {"
            echo "  AppSecrets._();"
            echo "  static const String gasBaseUrl   = 'https://placeholder.example.com';"
            echo "  static const String gasSecretKey = 'placeholder';"
            echo "  static const String geminiApiKey = 'placeholder';"
            echo "}"
          } > packages/shared/lib/config/secrets.dart

      - name: Phase 1 - Generate Isar Models (temp pubspec)
        env:
          ISAR_PUBSPEC: |
            name: shared
            environment:
              sdk: '>=3.3.0 <4.0.0'
              flutter: '>=3.44.0'
            dependencies:
              flutter:
                sdk: flutter
              isar: ^3.1.0
              isar_flutter_libs: ^3.1.0
              path_provider: ^2.1.3
            dev_dependencies:
              flutter_test:
                sdk: flutter
              build_runner: ^2.4.11
              isar_generator: ^3.1.0
            flutter:
              assets:
                - assets/images/
                - assets/l10n/
        run: |
          cp packages/shared/pubspec.yaml packages/shared/pubspec.yaml.bak
          printf '%s' "$ISAR_PUBSPEC" > packages/shared/pubspec.yaml
          cd packages/shared
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          cd ../..
          cp packages/shared/pubspec.yaml.bak packages/shared/pubspec.yaml

      - name: Phase 2 - Bootstrap + Generate Riverpod Providers
        run: |
          melos bootstrap
          melos run generate

      - name: Analyze All Packages
        run: melos run analyze

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.0

      - name: Bootstrap Packages
        run: melos bootstrap

      - name: Create Secrets Placeholder
        run: |
          {
            echo "// CI placeholder - real values injected in CD"
            echo "class AppSecrets {"
            echo "  AppSecrets._();"
            echo "  static const String gasBaseUrl   = 'https://placeholder.example.com';"
            echo "  static const String gasSecretKey = 'placeholder';"
            echo "  static const String geminiApiKey = 'placeholder';"
            echo "}"
          } > packages/shared/lib/config/secrets.dart

      - name: Phase 1 - Generate Isar Models (temp pubspec)
        env:
          ISAR_PUBSPEC: |
            name: shared
            environment:
              sdk: '>=3.3.0 <4.0.0'
              flutter: '>=3.44.0'
            dependencies:
              flutter:
                sdk: flutter
              isar: ^3.1.0
              isar_flutter_libs: ^3.1.0
              path_provider: ^2.1.3
            dev_dependencies:
              flutter_test:
                sdk: flutter
              build_runner: ^2.4.11
              isar_generator: ^3.1.0
            flutter:
              assets:
                - assets/images/
                - assets/l10n/
        run: |
          cp packages/shared/pubspec.yaml packages/shared/pubspec.yaml.bak
          printf '%s' "$ISAR_PUBSPEC" > packages/shared/pubspec.yaml
          cd packages/shared
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          cd ../..
          cp packages/shared/pubspec.yaml.bak packages/shared/pubspec.yaml

      - name: Phase 2 - Bootstrap + Generate Riverpod Providers
        run: |
          melos bootstrap
          melos run generate

      - name: Run Tests
        run: melos run test

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
