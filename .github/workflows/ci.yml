# .github/workflows/ci.yml
#
# CI — يعمل على كل Pull Request وكل push لـ main/develop
# يفحص الكود ويشغل الاختبارات بدون بناء APK

name: CI — Analyze & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── فحص وتحليل الكود ──────────────────────────────────────
  analyze:
    name: Dart Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel:         stable
          cache:           true

      - name: Install Melos
        run: dart pub global activate melos 6.3.0

      - name: Bootstrap Packages
        run: melos bootstrap

      - name: Create Secrets File (placeholder for analyze)
        run: |
          cat > packages/shared/lib/config/secrets.dart << 'SECRETS_EOF'
// CI placeholder — real values injected in CD
class AppSecrets {
  AppSecrets._();
  static const String gasBaseUrl   = 'https://placeholder.example.com';
  static const String gasSecretKey = 'placeholder';
  static const String geminiApiKey = 'placeholder';
}
SECRETS_EOF

      - name: Generate Code (build_runner)
        run: melos run generate

      - name: Analyze All Packages
        run: melos run analyze

  # ── تشغيل الاختبارات ──────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel:         stable
          cache:           true

      - name: Install Melos
        run: dart pub global activate melos 6.3.0

      - name: Bootstrap
        run: melos bootstrap

      - name: Create Secrets File (placeholder for tests)
        run: |
          cat > packages/shared/lib/config/secrets.dart << 'SECRETS_EOF'
// CI placeholder — real values injected in CD
class AppSecrets {
  AppSecrets._();
  static const String gasBaseUrl   = 'https://placeholder.example.com';
  static const String gasSecretKey = 'placeholder';
  static const String geminiApiKey = 'placeholder';
}
SECRETS_EOF

      - name: Generate Code
        run: melos run generate

      - name: Run Tests
        run: melos run test

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
