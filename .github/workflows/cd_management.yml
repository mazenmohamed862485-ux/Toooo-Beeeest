# .github/workflows/cd_management.yml
#
# CD لتطبيق TO Best Management — APK داخلي للفريق
# يُشغَّل عند push tag من نوع v*.*.*-management

name: CD — Management APK

on:
  push:
    tags:
      - 'v*.*.*-management'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required:    true
        default:     'production'
        type:        choice
        options:     [production, staging]

env:
  FLUTTER_VERSION: '3.24.5'
  APP_DIR:         apps/tobest_management

jobs:
  build-android:
    name: Build Management APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel:         stable
          cache:           true

      - name: Install Melos
        run: dart pub global activate melos 6.3.0

      - name: Bootstrap Monorepo
        run: melos bootstrap

      - name: Generate Code
        run: melos run generate

      # ── ملف الأسرار ──────────────────────────────────
      - name: Create Secrets File
        env:
          GAS_BASE_URL:   ${{ secrets.GAS_BASE_URL }}
          GAS_SECRET_KEY: ${{ secrets.GAS_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > packages/shared/lib/config/secrets.dart << SECRETS_EOF
// AUTO-GENERATED by CI — do not edit
class AppSecrets {
  AppSecrets._();
  static const String gasBaseUrl   = '${GAS_BASE_URL}';
  static const String gasSecretKey = '${GAS_SECRET_KEY}';
  static const String geminiApiKey = '${GEMINI_API_KEY}';
}
SECRETS_EOF

      # ── توقيع Android ─────────────────────────────────
      - name: Decode Keystore
        run: |
          echo "${{ secrets.MANAGEMENT_KEYSTORE_BASE64 }}" | base64 --decode \
            > ${{ env.APP_DIR }}/android/app/management.jks

      - name: Create key.properties
        run: |
          cat > ${{ env.APP_DIR }}/android/key.properties << EOF
          storePassword=${{ secrets.MGMT_KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.MGMT_KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.MGMT_KEYSTORE_KEY_ALIAS }}
          storeFile=management.jks
          EOF

      # ── بناء APK ─────────────────────────────────────
      - name: Build Release APK
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --build-name="${GITHUB_REF_NAME:-1.0.0}" \
            --build-number="${GITHUB_RUN_NUMBER:-1}"

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-v1.0.0}"
          BUILD="${GITHUB_RUN_NUMBER:-1}"
          cp ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-release.apk \
             management-${VERSION}-build${BUILD}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name:           management-apk-${{ github.run_number }}
          path:           management-*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files:              management-*.apk
          generate_release_notes: true
          draft:              false
          prerelease:         true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Secrets
        if: always()
        run: |
          rm -f packages/shared/lib/config/secrets.dart
          rm -f ${{ env.APP_DIR }}/android/app/management.jks
          rm -f ${{ env.APP_DIR }}/android/key.properties
