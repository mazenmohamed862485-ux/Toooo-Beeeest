name: CD - Management APK

on:
  push:
    tags:
      - 'v*.*.*-management'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  FLUTTER_VERSION: '3.44.2'
  APP_DIR: apps/tobest_management

jobs:
  build-android:
    name: Build Management APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.0

      - name: Bootstrap Monorepo
        run: melos bootstrap

      - name: Create Secrets File
        env:
          GAS_BASE_URL: ${{ secrets.GAS_BASE_URL }}
          GAS_SECRET_KEY: ${{ secrets.GAS_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          {
            echo "// AUTO-GENERATED by CI - do not edit"
            echo "class AppSecrets {"
            echo "  AppSecrets._();"
            printf "  static const String gasBaseUrl   = '%s';\n" "${GAS_BASE_URL}"
            printf "  static const String gasSecretKey = '%s';\n" "${GAS_SECRET_KEY}"
            printf "  static const String geminiApiKey = '%s';\n" "${GEMINI_API_KEY}"
            echo "}"
          } > packages/shared/lib/config/secrets.dart

      - name: Phase 1 - Generate Isar Models
        env:
          ISAR_PUBSPEC: |
            name: shared
            environment:
              sdk: '>=3.3.0 <4.0.0'
              flutter: '>=3.44.0'
            dependencies:
              flutter:
                sdk: flutter
              flutter_riverpod: ^2.5.1
              riverpod_annotation: ^2.3.5
              hooks_riverpod: ^2.5.1
              flutter_hooks: ^0.20.5
              isar: ^3.1.0
              isar_flutter_libs: ^3.1.0
              path_provider: ^2.1.3
              dio: ^5.4.3
              go_router: ^14.2.0
              video_player: ^2.8.7
              flutter_local_notifications: ^17.2.2
              google_sign_in: ^6.2.1
              google_generative_ai: ^0.4.6
              google_fonts: ^6.2.1
              pedometer: ^4.0.2
              image_picker: ^1.1.2
              flutter_secure_storage: ^9.2.2
              connectivity_plus: ^6.0.3
              cached_network_image: ^3.3.1
              workmanager: ^0.9.0
              intl: ^0.20.0
              uuid: ^4.4.0
              crypto: ^3.0.3
              shared_preferences: ^2.2.3
              permission_handler: ^11.3.1
            dev_dependencies:
              flutter_test:
                sdk: flutter
              build_runner: ^2.4.11
              isar_generator: ^3.1.0
            flutter:
              assets:
                - assets/images/
                - assets/l10n/
        run: |
          cp packages/shared/pubspec.yaml packages/shared/pubspec.yaml.bak
          printf '%s\n' "$ISAR_PUBSPEC" > packages/shared/pubspec.yaml
          cd packages/shared && flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          cd ../..
          cp packages/shared/pubspec.yaml.bak packages/shared/pubspec.yaml

      - name: Phase 2 - Bootstrap + Generate Riverpod Providers
        run: |
          mkdir -p /tmp/shared_isar_backup
          find packages/shared/lib -name "*.g.dart" \
            -exec cp --parents {} /tmp/shared_isar_backup/ \; 2>/dev/null || true
          echo "Backed up $(find /tmp/shared_isar_backup -name '*.g.dart' | wc -l) Isar files"

          melos bootstrap

          (cd packages/shared && dart run build_runner build --delete-conflicting-outputs)

          find /tmp/shared_isar_backup/packages/shared/lib -name "*.g.dart" 2>/dev/null \
            | while read f; do
                rel="${f#/tmp/shared_isar_backup/}"
                mkdir -p "$(dirname "$rel")"
                cp "$f" "$rel"
              done
          echo "Restored: $(find packages/shared/lib -name '*.g.dart' | wc -l) .g.dart files in shared"

          (cd apps/tobest_management && dart run build_runner build --delete-conflicting-outputs)

      - name: Fix isar_flutter_libs Namespace (AGP 8.x compat)
        run: |
          ISAR_BUILD_GRADLE="$HOME/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android/build.gradle"
          if [ -f "$ISAR_BUILD_GRADLE" ]; then
            if ! grep -q "namespace" "$ISAR_BUILD_GRADLE"; then
              sed -i "s/android {/android {\n    namespace 'dev.isar.isar_flutter_libs'/" "$ISAR_BUILD_GRADLE"
              echo "Patched isar_flutter_libs namespace"
            else
              echo "namespace already present"
            fi
          else
            echo "isar_flutter_libs build.gradle not found at expected path"
            find ~/.pub-cache -name "build.gradle" -path "*isar_flutter_libs*" 2>/dev/null | head -5
          fi

      - name: Decode Keystore
        run: echo "${{ secrets.MANAGEMENT_KEYSTORE_BASE64 }}" | base64 --decode > ${{ env.APP_DIR }}/android/app/management.jks

      - name: Create key.properties
        run: |
          {
            echo "storePassword=${{ secrets.MGMT_KEYSTORE_STORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.MGMT_KEYSTORE_KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.MGMT_KEYSTORE_KEY_ALIAS }}"
            echo "storeFile=management.jks"
          } > ${{ env.APP_DIR }}/android/key.properties

      - name: Build Release APK
        working-directory: ${{ env.APP_DIR }}
        run: flutter build apk --release --target-platform android-arm64 --build-name="${GITHUB_REF_NAME:-1.0.0}" --build-number="${GITHUB_RUN_NUMBER:-1}"

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-v1.0.0}"
          BUILD="${GITHUB_RUN_NUMBER:-1}"
          cp ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-release.apk management-${VERSION}-build${BUILD}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: management-apk-${{ github.run_number }}
          path: management-*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: management-*.apk
          generate_release_notes: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Secrets
        if: always()
        run: |
          rm -f packages/shared/lib/config/secrets.dart
          rm -f ${{ env.APP_DIR }}/android/app/management.jks
          rm -f ${{ env.APP_DIR }}/android/key.properties
