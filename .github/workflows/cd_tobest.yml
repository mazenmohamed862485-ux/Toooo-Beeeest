# .github/workflows/cd_tobest.yml
#
# CD لتطبيق TO Best — يبني APK ويرفعه كـ Release Asset
# يُشغَّل تلقائياً عند push tag من نوع v*.*.*-tobest

name: CD — TO Best APK

on:
  push:
    tags:
      - 'v*.*.*-tobest'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required:    true
        default:     'release'
        type:        choice
        options:     [release, debug]

env:
  FLUTTER_VERSION: '3.44.0'
  APP_DIR:         apps/tobest

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── إعداد Java ──────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── إعداد Flutter ────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel:         stable
          cache:           true

      # ── Melos Bootstrap ───────────────────────────────
      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap Monorepo
        run: melos bootstrap

      # ── توليد الكود ──────────────────────────────────
      - name: Generate Code
        run: melos run generate

      # ── ملف الأسرار ──────────────────────────────────
      # ⚠️ يُنشأ من Secrets في GitHub — لا يُرفع في الكود
      - name: Create Secrets File
        env:
          GAS_BASE_URL:   ${{ secrets.GAS_BASE_URL }}
          GAS_SECRET_KEY: ${{ secrets.GAS_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > packages/shared/lib/config/secrets.dart << SECRETS_EOF
// AUTO-GENERATED by CI — do not edit
class AppSecrets {
  AppSecrets._();
  static const String gasBaseUrl   = '${GAS_BASE_URL}';
  static const String gasSecretKey = '${GAS_SECRET_KEY}';
  static const String geminiApiKey = '${GEMINI_API_KEY}';
}
SECRETS_EOF

      # ── توقيع Android (من Secrets) ────────────────────
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > ${{ env.APP_DIR }}/android/app/tobest.jks

      - name: Create key.properties
        run: |
          cat > ${{ env.APP_DIR }}/android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          storeFile=tobest.jks
          EOF

      # ── بناء APK ─────────────────────────────────────
      - name: Build Release APK
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --build-name="${GITHUB_REF_NAME:-1.0.0}" \
            --build-number="${GITHUB_RUN_NUMBER:-1}" \
            --dart-define="BUILD_ENV=production"

      # ── تسمية الملف ──────────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-v1.0.0}"
          BUILD="${GITHUB_RUN_NUMBER:-1}"
          cp ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-release.apk \
             tobest-${VERSION}-build${BUILD}.apk

      # ── رفع كـ Artifact ───────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name:             tobest-apk-${{ github.run_number }}
          path:             tobest-*.apk
          retention-days:   30

      # ── نشر كـ GitHub Release ─────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files:              tobest-*.apk
          generate_release_notes: true
          draft:              false
          prerelease:         false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── تنظيف الأسرار ────────────────────────────────
      - name: Cleanup Secrets
        if: always()
        run: |
          rm -f packages/shared/lib/config/secrets.dart
          rm -f ${{ env.APP_DIR }}/android/app/tobest.jks
          rm -f ${{ env.APP_DIR }}/android/key.properties
